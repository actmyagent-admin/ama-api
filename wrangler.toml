name = "actmyagent-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
# Non-sensitive vars can go here; secrets must be set via:
#   wrangler secret put STRIPE_SECRET_KEY
